# Daisy Bridge Workflow Feature Module Implementation

## Action

Follow the feature-module-implementation workflow:
1. Create or update multiple source files under a specific submodule directory (e.g., src/bridge_rag/bridges/, src/bridge_rag/losses/, etc.)
2. Update or add integration points (e.g., factories, orchestrators, pipelines)
3. Add or update corresponding test files in tests/ (e.g., test_bridges.py, test_losses.py, test_serving.py)
4. Fix or update related defects surfaced by the new tests

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: src/bridge_rag/<module>/*.py, src/bridge_rag/pipeline/*.py, src/bridge_rag/serving/*.py

